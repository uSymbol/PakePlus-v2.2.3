<!DOCTYPE html>

<html lang="zh-CN">
<head><meta content="default-src 'none'; style-src * 'unsafe-inline'; script-src * 'unsafe-inline'; img-src * data: blob:; font-src * data:; media-src * data: blob:; connect-src 'none'; form-action 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'" http-equiv="Content-Security-Policy"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>课堂抽签小助手</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/cdn.jsdelivr.net/npm/canvas-confetti/1.6.0/dist/confetti.browser.min.js"></script>
<style>
        :root {
            --bg-color: #2d2d2d;
            --screen-bg: #9bbc0f; /* 经典GameBoy绿 */
            --screen-bg-dark: #8bac0f;
            --primary-color: #0f380f;
            --accent-color: #306230;
            --highlight-color: #8bac0f;
            --border-color: #000000;
            --btn-blue: #3b82f6;
            --btn-red: #ef4444;
            --btn-green: #22c55e;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            user-select: none; /* 防止双击选中文本，更有App感 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 简单的网格背景纹理 */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 主容器：类似掌机外壳 */
        .console-container {
            width: 100%;
            max-width: 600px;
            background-color: #c0c0c0;
            padding: 20px;
            border-radius: 10px 10px 40px 10px; /* 复古圆角 */
            box-shadow: 
                -5px -5px 0px 0px #e0e0e0,
                5px 5px 0px 0px #808080,
                10px 10px 20px rgba(0,0,0,0.5);
            border: 4px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 顶部标题栏 */
        header {
            text-align: center;
            background-color: #555;
            color: #fff;
            padding: 10px;
            border: 4px solid var(--border-color);
            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.2), inset -2px -2px 0px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        h1 {
            font-size: 16px;
            margin: 0;
            text-shadow: 2px 2px 0px #000;
        }

        /* 屏幕区域 */
        .screen-bezel {
            background-color: #555;
            padding: 20px 20px 40px 20px;
            border-radius: 10px 10px 30px 10px;
            border: 4px solid var(--border-color);
            position: relative;
        }

        .screen-lens {
            background-color: var(--screen-bg);
            border: 4px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.2);
        }

        /* 扫描线效果 */
        .screen-lens::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* 屏幕内内容布局 */
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 3;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        /* 结果显示区 */
        .result-display {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(15, 56, 15, 0.1);
            border: 2px dashed var(--primary-color);
            min-height: 120px;
            padding: 10px;
            text-align: center;
        }

        .current-name {
            font-size: 24px;
            color: var(--primary-color);
            word-break: break-all;
            line-height: 1.5;
        }

        .placeholder-text {
            font-size: 12px;
            color: var(--accent-color);
        }

        /* 已抽名单列表 */
        .history-list {
            height: 80px;
            overflow-y: auto;
            border: 2px solid var(--primary-color);
            background: rgba(0,0,0,0.05);
            padding: 5px;
            font-size: 10px;
            list-style: none;
            margin: 0;
        }

        .history-list li {
            padding: 2px 0;
            border-bottom: 1px dotted var(--accent-color);
        }

        /* 滚动条样式 */
        .history-list::-webkit-scrollbar {
            width: 8px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: var(--primary-color);
        }
        .history-list::-webkit-scrollbar-track {
            background: var(--screen-bg-dark);
        }

        /* 控制区域 */
        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 10px;
        }

        /* 文件上传 */
        .file-upload-wrapper {
            position: relative;
            text-align: center;
        }

        .file-input {
            display: none;
        }

        .file-label {
            display: inline-block;
            background-color: var(--btn-blue);
            color: white;
            padding: 10px 15px;
            font-size: 12px;
            border: 4px solid var(--border-color);
            box-shadow: 4px 4px 0px 0px #1d4ed8;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .file-label:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px 0px #1d4ed8;
        }

        .file-label:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px #1d4ed8;
        }

        .file-name-display {
            margin-top: 5px;
            font-size: 10px;
            color: #666;
            height: 15px;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .pixel-btn {
            flex: 1;
            padding: 15px 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: white;
            border: 4px solid var(--border-color);
            cursor: pointer;
            position: relative;
            text-transform: uppercase;
        }

        .btn-draw {
            background-color: var(--btn-green);
            box-shadow: 4px 4px 0px 0px #15803d;
        }
        
        .btn-draw:hover:not(:disabled) {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px 0px #15803d;
        }

        .btn-draw:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px #15803d;
        }

        .btn-draw:disabled {
            background-color: #555;
            box-shadow: 2px 2px 0px 0px #333;
            cursor: not-allowed;
            color: #999;
        }

        .btn-reset {
            background-color: var(--btn-red);
            box-shadow: 4px 4px 0px 0px #b91c1c;
            flex: 0.6;
        }

        .btn-reset:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px 0px #b91c1c;
        }

        .btn-reset:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px #b91c1c;
        }

        /* Toast 提示框 */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: 2px solid #fff;
            font-size: 12px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
            max-width: 90vw;
            text-align: center;
        }

        .toast.error {
            border-color: var(--btn-red);
            color: #ffcccc;
        }

        .toast.success {
            border-color: var(--btn-green);
            color: #ccffcc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .console-container {
                border-radius: 0;
                border: none;
                height: 100vh;
                justify-content: flex-start;
            }
            .screen-bezel {
                flex: 1;
            }
            .current-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div id="toast-container"></div>
<div class="console-container">
<header>
<h1>课堂抽签小助手</h1>
</header>
<div class="screen-bezel">
<div class="screen-lens">
<div class="screen-content">
<div class="status-bar">
<span>POOL: <span id="pool-count">0</span></span>
<span>DRAWN: <span id="drawn-count">0</span></span>
</div>
<div class="result-display">
<div class="placeholder-text" id="result-text">请上传名单<br/>READY?</div>
</div>
<div style="font-size: 10px; margin-bottom: 2px; color: var(--primary-color);">已抽名单:</div>
<ul class="history-list" id="history-list">
</ul>
</div>
</div>
</div>
<div class="controls-area">
<div class="file-upload-wrapper">
<input accept=".txt" class="file-input" id="file-input" type="file"/>
<label class="file-label" for="file-input">
<i class="fa fa-upload"></i> 选择学生名单文件
                </label>
<div class="file-name-display" id="file-name">未选择文件</div>
</div>
<div class="button-group">
<button class="pixel-btn btn-draw" disabled="" id="btn-draw">抽签</button>
<button class="pixel-btn btn-reset" id="btn-reset">重置</button>
</div>
</div>
</div>
<script>
        // Data State
        let allStudents = []; // Original list
        let remainingStudents = []; // Current pool
        let drawnStudents = []; // History

        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const btnDraw = document.getElementById('btn-draw');
        const btnReset = document.getElementById('btn-reset');
        const resultText = document.getElementById('result-text');
        const poolCountDisplay = document.getElementById('pool-count');
        const drawnCountDisplay = document.getElementById('drawn-count');
        const historyList = document.getElementById('history-list');
        const toastContainer = document.getElementById('toast-container');

        // --- Event Listeners ---

        fileInput.addEventListener('change', handleFileUpload);
        btnDraw.addEventListener('click', startDraw);
        btnReset.addEventListener('click', resetApp);

        // --- Core Functions ---

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.type !== "text/plain") {
                showToast("请上传 .txt 格式的文件", "error");
                return;
            }

            const reader = new FileReader();
            
            reader.onload = function(e) {
                const text = e.target.result;
                // Split by newline, trim whitespace, filter empty lines
                const names = text.split(/\r?\n/).map(name => name.trim()).filter(name => name.length > 0);

                if (names.length === 0) {
                    showToast("文件内容为空，请检查", "error");
                    return;
                }

                // Initialize Data
                allStudents = [...names];
                remainingStudents = [...names];
                drawnStudents = [];

                // Update UI
                fileNameDisplay.textContent = file.name;
                updateStats();
                clearHistory();
                resultText.innerHTML = '<span class="placeholder-text">名单已加载<br>START!</span>';
                resultText.className = 'placeholder-text';
                
                btnDraw.disabled = false;
                showToast(`成功加载 ${names.length} 位学生`, "success");
            };

            reader.onerror = function() {
                showToast("文件读取失败", "error");
            };

            reader.readAsText(file);
        }

        function startDraw() {
            if (remainingStudents.length === 0) {
                showToast("所有学生都已抽完，请重置", "error");
                return;
            }

            // Disable button during animation
            btnDraw.disabled = true;
            fileInput.disabled = true;

            // Animation Logic (Rolling effect)
            let rollCount = 0;
            const maxRolls = 15; // Number of name switches
            const intervalTime = 80; // Speed of switching

            const intervalId = setInterval(() => {
                // Pick a random name temporarily for display
                const randomIndex = Math.floor(Math.random() * remainingStudents.length);
                const tempName = remainingStudents[randomIndex];
                
                resultText.textContent = tempName;
                resultText.className = 'current-name';
                
                rollCount++;

                if (rollCount >= maxRolls) {
                    clearInterval(intervalId);
                    finalizeDraw();
                }
            }, intervalTime);
        }

        function finalizeDraw() {
            // Actual Random Selection
            const finalIndex = Math.floor(Math.random() * remainingStudents.length);
            const selectedName = remainingStudents[finalIndex];

            // Update State
            remainingStudents.splice(finalIndex, 1);
            drawnStudents.push(selectedName);

            // Update UI
            resultText.textContent = selectedName;
            resultText.className = 'current-name';
            
            updateStats();
            addToHistory(selectedName);

            // Re-enable controls
            if (remainingStudents.length === 0) {
                btnDraw.disabled = true;
                showToast("抽签结束！", "success");
            } else {
                btnDraw.disabled = false;
            }
            fileInput.disabled = false;

            // Trigger Confetti
            triggerConfetti();
        }

        function resetApp() {
            if (allStudents.length === 0) {
                showToast("请先上传名单", "error");
                return;
            }

            // Confirm logic (Simple custom confirm could go here, but for speed just reset)
            // Restore state
            remainingStudents = [...allStudents];
            drawnStudents = [];

            // Update UI
            updateStats();
            clearHistory();
            resultText.innerHTML = '<span class="placeholder-text">已重置<br>READY?</span>';
            resultText.className = 'placeholder-text';
            btnDraw.disabled = false;

            showToast("系统已重置", "success");
        }

        // --- Helper Functions ---

        function updateStats() {
            poolCountDisplay.textContent = remainingStudents.length;
            drawnCountDisplay.textContent = drawnStudents.length;
        }

        function addToHistory(name) {
            const li = document.createElement('li');
            li.textContent = `${drawnStudents.length}. ${name}`;
            // Insert at top
            historyList.insertBefore(li, historyList.firstChild);
        }

        function clearHistory() {
            historyList.innerHTML = '';
        }

        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            
            toastContainer.appendChild(toast);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 300);
            }, 3000);
        }

        function triggerConfetti() {
            const count = 200;
            const defaults = {
                origin: { y: 0.7 }
            };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, {
                spread: 26,
                startVelocity: 55,
            });
            fire(0.2, {
                spread: 60,
            });
            fire(0.35, {
                decay: 0.91,
                scalar: 0.8
            });
            fire(0.1, {
                spread: 120,
                startVelocity: 25,
                decay: 0.92,
                scalar: 1.2
            });
            fire(0.1, {
                spread: 120,
                startVelocity: 45,
            });
        }
    </script>
</body>
</html>
